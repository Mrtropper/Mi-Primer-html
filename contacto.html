<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <header class="bg-dark text-white text-center py-4">
        <h1>Contacto</h1>
    </header>


    <div class="container mt-5">

        <div class="row justify-content-center">
            <div class="col-md-6">


                <div class="card shadow">
                    <div class="card-body">

                        <h3 class="text-center mb-4">Envíame un mensaje</h3>

                        <form>


                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" placeholder="Ingrese su nombre">
                            </div>


                            <div class="mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" placeholder="ejemplo@email.com">
                            </div>


                            <div class="mb-3">
                                <label class="form-label">Mensaje</label>
                                <textarea class="form-control" rows="4" placeholder="Escriba su mensaje"></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Enviar mensaje
                            </button>

                        </form>

                    </div>
                </div>


                <a href="index.html" class="btn btn-secondary mt-3 w-100">
                    Volver al inicio
                </a>

            </div>
        </div>

    </div>


    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">© 2026 Fabricio Amores | Todos los derechos reservados</p>
    </footer>

    <!-- Bootstrap JavaScript Libraries -->
    <script
        src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"
    ></script>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"
    ></script>
</body>
</body>
</html>
